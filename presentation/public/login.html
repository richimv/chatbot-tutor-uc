<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Tutor IA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-panel-left">
            <a href="/" title="Volver al inicio">
                <img src="/assets/logo.png" alt="Logo Tutor IA" class="logo-img">
            </a>
            <h2>Bienvenido de Vuelta</h2>
            <p>Accede a tu cuenta para continuar tu aprendizaje con nuestro Tutor IA.</p>
        </div>
        <div class="auth-panel-right">
            <form id="login-form" class="auth-form">
                <h2>Iniciar Sesión</h2>
                <p class="form-subtitle">Ingresa tus credenciales para acceder.</p>
                <div id="error-message" class="error-message" style="display:none;"></div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary" id="login-button">Acceder</button>
                <div class="auth-switch-link">
                    ¿No tienes una cuenta? <a href="/register.html">Regístrate aquí</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/services/authApiService.js"></script>
    <script src="/js/sessionManager.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const loginButton = document.getElementById('login-button');

            loginButton.disabled = true;
            loginButton.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Ingresando...';
            errorDiv.style.display = 'none';

            try {
                const { token, user } = await AuthApiService.login(email, password);
                window.sessionManager.login(token, user);
                window.location.href = '/'; // Redirigir al inicio
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            } finally {
                loginButton.disabled = false;
                loginButton.textContent = 'Acceder';
            }
        });
    </script>
</body>
</html>
