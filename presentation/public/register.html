<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Tutor IA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-panel-left">
            <a href="/" title="Volver al inicio">
                <img src="/assets/logo.png" alt="Logo Tutor IA" class="logo-img">
            </a>
            <h2>Únete a la Comunidad</h2>
            <p>Crea tu cuenta para acceder a todas las herramientas de aprendizaje y al Tutor IA.</p>
        </div>
        <div class="auth-panel-right">
            <form id="register-form" class="auth-form">
                <h2>Crear Cuenta</h2>
                <p class="form-subtitle">Completa tus datos para registrarte.</p>
                <div id="error-message" class="error-message" style="display:none;"></div>
                <div class="form-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" name="name" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" name="confirm-password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary" id="register-button">Registrarse</button>
                <div class="auth-switch-link">
                    ¿Ya tienes una cuenta? <a href="/login.html">Inicia sesión</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/services/authApiService.js"></script>
    <!-- ✅ SOLUCIÓN: Añadir la lógica de registro directamente aquí, ya que register.js no existe. -->
    <script src="/js/sessionManager.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('error-message');
            const registerButton = document.getElementById('register-button');

            errorDiv.style.display = 'none';

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Las contraseñas no coinciden.';
                errorDiv.style.display = 'block';
                return;
            }

            registerButton.disabled = true;
            registerButton.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Registrando...';

            try {
                const { token, user } = await AuthApiService.register(name, email, password);
                window.sessionManager.login(token, user); // Iniciar sesión automáticamente
                window.location.href = '/'; // Redirigir al inicio
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            } finally {
                registerButton.disabled = false;
                registerButton.textContent = 'Registrarse';
            }
        });
    </script>
</body>
</html>
